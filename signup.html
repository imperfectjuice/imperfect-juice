<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Imperfect Juice - Sign Up</title>
    <style>
        /* Reset and General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header and Navigation */
        header {
            background-color: #4CAF50;
            color: white;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }
        nav h1 {
            font-size: 24px;
        }
        nav ul {
            list-style: none;
            display: flex;
        }
        nav ul li {
            margin-left: 20px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav ul li a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* Hero/Signup Section */
        #signup {
            background-image: url('https://earth.org/wp-content/uploads/2021/01/rsz_the-skyscraper-3105740_1280-1200x900.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
        }
        #signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        #signup .signup-content {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            color: #333;
        }
        #signup h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        #signup form {
            display: flex;
            flex-direction: column;
        }
        #signup label {
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
        }
        #signup input {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #signup .btn {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #signup .btn:hover {
            background-color: #45a049;
        }
        #signup p {
            margin-top: 15px;
        }
        #signup a {
            color: #4CAF50;
            text-decoration: none;
        }
        #signup a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #signup .signup-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <h1>Perfectly Imperfect Juice</h1>
                <ul>





                </ul>
            </nav>
        </div>
    </header>

    <section id="signup">
        <div class="signup-content">
            <h2>Sign Up</h2>
            <form id="signupForm">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
                
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2025 Perfectly Imperfect Juice. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Smooth Scroll for Navigation Links (if needed, but since it's signup, minimal)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Simulate Signup with JS (no backend)
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (name && email && password && confirmPassword) {
                if (password === confirmPassword) {
                    alert(`Thank you for signing up, ${name}! (This is a simulation - no real account created.)`);
                    // Redirect to login or home in a real app
                    // window.location.href = '/login.html';
                } else {
                    alert('Passwords do not match.');
                }
            } else {
                alert('Please fill in all fields.');
            }
        });
    </script>
</body>
</html>
